name: Build WordPress Plugin

on:
  # Trigger on push to main and develop branches
  push:
    branches: [ main, develop ]
  
  # Trigger on pull requests
  pull_request:
    branches: [ main, develop ]
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Override version (optional, defaults to current version)'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build WordPress ZIP Package
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup PHP
      uses: shivammathur/setup-php@v2
      with:
        php-version: 8.1
        tools: composer:v2
        extensions: zip
    
    - name: Get version from plugin file
      id: version
      run: |
        if [ -n "${{ github.event.inputs.version_override }}" ]; then
          VERSION="${{ github.event.inputs.version_override }}"
        else
          VERSION=$(grep "Version:" fp-digital-marketing-suite.php | head -1 | sed 's/.*Version:\s*//' | tr -d ' ')
        fi
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "Building version: ${VERSION}"
    
    - name: Cache Composer packages
      uses: actions/cache@v3
      with:
        path: vendor
        key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
        restore-keys: |
          ${{ runner.os }}-composer-
    
    - name: Install production dependencies
      run: composer install --no-dev --optimize-autoloader --no-interaction
    
    - name: Run build script
      env:
        PLUGIN_VERSION: ${{ steps.version.outputs.version }}
      run: |
        # Make build script executable
        chmod +x build.sh

        # Run the build process
        ./build.sh
    
    - name: Verify build artifacts
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        PLUGIN_NAME="fp-digital-marketing-suite"
        ZIP_FILE="dist/${PLUGIN_NAME}-${VERSION}.zip"
        CHECKSUM_FILE="dist/${PLUGIN_NAME}-${VERSION}.zip.sha256"
        
        if [ ! -f "${ZIP_FILE}" ]; then
          echo "❌ ZIP file not found: ${ZIP_FILE}"
          exit 1
        fi
        
        if [ ! -f "${CHECKSUM_FILE}" ]; then
          echo "❌ Checksum file not found: ${CHECKSUM_FILE}"
          exit 1
        fi
        
        # Verify ZIP file integrity
        if ! unzip -t "${ZIP_FILE}" > /dev/null 2>&1; then
          echo "❌ ZIP file is corrupted"
          exit 1
        fi
        
        # Display build info
        echo "✅ Build verification successful"
        echo "📦 Package: ${ZIP_FILE}"
        echo "📏 Size: $(du -h ${ZIP_FILE} | cut -f1)"
        echo "🔐 Checksum: $(cat ${CHECKSUM_FILE})"
        
        # Verify plugin structure
        echo "🔍 Verifying plugin structure..."
        unzip -l "${ZIP_FILE}" | head -20
        
        # Check for main plugin file
        if ! unzip -l "${ZIP_FILE}" | grep -q "${PLUGIN_NAME}/${PLUGIN_NAME}.php"; then
          echo "❌ Main plugin file not found in ZIP"
          exit 1
        fi
        
        echo "✅ Plugin structure verification passed"
    
    - name: Generate build info
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        PLUGIN_NAME="fp-digital-marketing-suite"
        ZIP_FILE="dist/${PLUGIN_NAME}-${VERSION}.zip"
        
        # Create build information file
        cat > build-info.md << EOF
        # 📦 FP Digital Marketing Suite - Build Artifacts
        
        **Version:** ${VERSION}  
        **Build Date:** $(date)  
        **Commit:** ${{ github.sha }}  
        **Branch:** ${{ github.ref_name }}  
        
        ## 📋 Package Information
        
        - **File:** ${PLUGIN_NAME}-${VERSION}.zip
        - **Size:** $(du -h ${ZIP_FILE} | cut -f1)
        - **Files:** $(unzip -l ${ZIP_FILE} | tail -1 | awk '{print $2}')
        
        ## 🚀 Installation Instructions
        
        1. Download the ZIP file from the artifacts below
        2. Go to WordPress Admin → Plugins → Add New → Upload Plugin
        3. Select the downloaded ZIP file and click "Install Now"
        4. Activate the plugin after installation
        5. Configure the plugin in Settings → FP Digital Marketing
        
        ## ✅ Ready for WordPress Installation
        
        This package has been built and verified for WordPress installation. It includes:
        - Production-ready code with optimized dependencies
        - All required assets and translations
        - Proper plugin structure and metadata
        - Security and compatibility checks passed
        
        EOF
        
        cat build-info.md
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: wp-plugin-${{ steps.version.outputs.version }}-${{ github.run_number }}
        path: |
          dist/fp-digital-marketing-suite-${{ steps.version.outputs.version }}.zip
          dist/fp-digital-marketing-suite-${{ steps.version.outputs.version }}.zip.sha256
          build-info.md
        retention-days: 30
    
    - name: Upload to releases (if tagged)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          dist/fp-digital-marketing-suite-${{ steps.version.outputs.version }}.zip
          dist/fp-digital-marketing-suite-${{ steps.version.outputs.version }}.zip.sha256
          build-info.md
        body_path: build-info.md
        name: FP Digital Marketing Suite v${{ steps.version.outputs.version }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Comment on PR (if PR)
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const version = '${{ steps.version.outputs.version }}';
          const runNumber = '${{ github.run_number }}';
          const artifactName = `wp-plugin-${version}-${runNumber}`;
          
          const comment = `
          ## 📦 WordPress Plugin Build Ready
          
          The WordPress plugin has been successfully built and is ready for testing!
          
          **Version:** ${version}  
          **Artifact:** \`${artifactName}\`
          
          ### 🔽 Download & Test
          1. Go to the [Actions tab](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
          2. Download the \`${artifactName}\` artifact
          3. Extract and upload the ZIP file to your WordPress test site
          
          ### ✅ Build Verification
          - ZIP package structure verified
          - All required files included
          - Checksum generated and verified
          - Ready for WordPress installation
          `;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });