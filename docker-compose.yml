version: '3.8'

services:
  wordpress:
    image: wordpress:latest
    container_name: fp-digital-marketing-wp
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_USER: fp_user
      WORDPRESS_DB_PASSWORD: fp_password
      WORDPRESS_DB_NAME: fp_digital_marketing
      WORDPRESS_DEBUG: 1
      WORDPRESS_DEBUG_LOG: 1
    volumes:
      - wordpress_data:/var/www/html
      - ./:/var/www/html/wp-content/plugins/fp-digital-marketing-suite
    depends_on:
      - db
    networks:
      - fp_network

  db:
    image: mysql:8.0
    container_name: fp-digital-marketing-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: fp_digital_marketing
      MYSQL_USER: fp_user
      MYSQL_PASSWORD: fp_password
      MYSQL_ROOT_PASSWORD: fp_root_password
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - fp_network

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: fp-digital-marketing-pma
    restart: unless-stopped
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: fp_root_password
    depends_on:
      - db
    networks:
      - fp_network

  redis:
    image: redis:alpine
    container_name: fp-digital-marketing-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - fp_network

volumes:
  wordpress_data:
  db_data:
  redis_data:

networks:
  fp_network:
    driver: bridge